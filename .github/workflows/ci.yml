name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on a new push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Skip network-bound tests in CI (LongMemEval download, etc.).
  # The local bench harness tests already cover offline paths.
  MEMPALACE_SKIP_NETWORK_TESTS: "1"
  # Fail CI if any step takes longer than this — prevents stuck jobs
  # from burning the org's free runner minutes.
  JOB_TIMEOUT_MIN: 30

jobs:
  # ------------------------------------------------------------------
  # Rust workspace checks: fmt + clippy + test + bench compile,
  # across the same OS matrix used by release.yml.
  # ------------------------------------------------------------------
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ fromJSON(env.JOB_TIMEOUT_MIN) }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `-D warnings` was dropped historically to unblock CI on a
      # pre-existing backlog of mechanical clippy lints (unused imports,
      # sort_by_key, is_empty, clamp, to_string_in_format_args, ...) across
      # 50+ files. New code should still be warning-free; the gate is
      # enforced via `cargo build` and the test suite. Re-enable
      # `-D warnings` once that backlog is cleared.
      - name: Clippy (all features)
        if: runner.os != 'Windows'
        run: cargo clippy --all-targets --all-features

      - name: Clippy (default features)
        if: runner.os == 'Windows'
        run: cargo clippy --all-targets

      - name: Test (all features)
        if: runner.os != 'Windows'
        run: cargo test --workspace --all-features

      - name: Test (default features)
        if: runner.os == 'Windows'
        run: cargo test --workspace

      # Compile (but don't run) criterion benches on every PR — mp-002 /
      # Phase 0. Catches API drift in the bench harnesses without paying
      # the multi-minute cost of actually running them.
      - name: Compile benches
        run: cargo bench --no-run -p mempalace-core

  # ------------------------------------------------------------------
  # Website docs build. The website/ tree is plain VitePress and ships
  # alongside the Rust workspace; markdown errors that break the build
  # would otherwise silently pass CI. Use pnpm since `bun` is not
  # available on the runner images by default.
  # ------------------------------------------------------------------
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(env.JOB_TIMEOUT_MIN) }}
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup installs a pinned pnpm version. v9.x matches
      # the lockfile generated by the developer workflow.
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website deps
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: VitePress build
        working-directory: website
        run: pnpm exec vitepress build

      # Upload the static site as a build artifact so PR reviewers can
      # download and browse it locally if the docs-preview workflow
      # isn't wired up.
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: website/.vitepress/dist/
          if-no-files-found: error
          retention-days: 7
