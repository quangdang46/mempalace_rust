name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
  MEMPALACE_SKIP_NETWORK_TESTS: "1"
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # 1. Format gate (must pass)
      - run: cargo fmt --all -- --check

      # 2. Build (catches type errors + dead code)
      - run: cargo build --workspace

      # 3. Test (catches runtime bugs)
      - run: cargo test --workspace --lib

      # 4. Compile benches (catches API drift, no run cost)
      - run: cargo bench --no-run -p mempalace-core
