name: Test
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        if: runner.os != 'Windows'
        run: cargo clippy --workspace --exclude mempalace-bench -- -D warnings
      - name: Test
        env:
          MEMPALACE_SKIP_NETWORK_TESTS: "1"
        run: cargo test --workspace --exclude mempalace-bench
