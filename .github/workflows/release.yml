name: Release
on:
  push:
    tags: ["v[0-9]+.*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-x86_64
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: macos-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: macos-aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-x86_64
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p mempalace
          else
            cargo build --release --target ${{ matrix.target }} -p mempalace
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mpr-${{ matrix.suffix }}.tar.gz mpr
          cd ../../..
          sha256sum mpr-${{ matrix.suffix }}.tar.gz > mpr-${{ matrix.suffix }}.tar.gz.sha256
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../mpr-${{ matrix.suffix }}.zip mpr.exe
          cd ../../..
          sha256sum mpr-${{ matrix.suffix }}.zip > mpr-${{ matrix.suffix }}.zip.sha256
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: mpr-${{ matrix.suffix }}
          path: mpr-${{ matrix.suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
