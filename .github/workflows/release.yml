name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tarball: mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            tarball: mempalace-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            tarball: mempalace-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            tarball: mempalace-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build release
        run: |
          cargo build --release --locked
          tar -czf ${{ matrix.tarball }} -C target/release mpr

      - name: Build macOS targets
        if: matrix.target != ''
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
          tar -czf ${{ matrix.tarball }} -C target/${{ matrix.target }}/release mpr

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          cargo build --release --locked
          cd target/release
          powershell -Command "Compress-Archive -Path 'mpr.exe' -DestinationPath '../${{ matrix.tarball }}' -Force"

      - name: Generate SHA256
        run: |
          sha256sum ${{ matrix.tarball }} > ${{ matrix.tarball }}.sha256

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} ${{ matrix.tarball }} --clobber
          gh release upload ${{ github.ref_name }} ${{ matrix.tarball }}.sha256 --clobber
