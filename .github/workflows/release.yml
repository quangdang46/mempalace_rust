name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tarball: mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            tarball: mempalace-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            tarball: mempalace-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            tarball: mempalace-${{ github.ref_name }}-x86_64-pc-windows-gnu.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cd target/${{ matrix.target }}/release
            powershell -Command "Compress-Archive -Path 'mpr.exe' -DestinationPath '../${{ matrix.tarball }}' -Force"
          else
            cd target/${{ matrix.target }}/release
            tar -czf ../${{ matrix.tarball }} mpr
          fi

      - name: Generate SHA256
        run: |
          sha256sum target/${{ matrix.target }}/release/${{ matrix.tarball }} > target/${{ matrix.target }}/release/${{ matrix.tarball }}.sha256

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} target/${{ matrix.target }}/release/${{ matrix.tarball }} --clobber
          gh release upload ${{ github.ref_name }} target/${{ matrix.target }}/release/${{ matrix.tarball }}.sha256 --clobber
