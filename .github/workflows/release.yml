name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: 'true'
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  release-linux:
    name: Release (linux)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release --locked
      - name: Package
        run: tar -czf mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz -C target/release mpr
      - name: SHA256
        run: sha256sum mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz > mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
      - name: Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz --clobber
          gh release upload ${{ github.ref_name }} mempalace-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256 --clobber

  release-macos:
    name: Release (macOS)
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: tar -czf mempalace-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mpr
      - name: SHA256
        run: sha256sum mempalace-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > mempalace-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
      - name: Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} mempalace-${{ github.ref_name }}-${{ matrix.target }}.tar.gz --clobber
          gh release upload ${{ github.ref_name }} mempalace-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256 --clobber

  release-windows:
    name: Release (Windows)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release --locked
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/mpr.exe -DestinationPath mempalace-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip -Force
      - name: SHA256
        shell: bash
        run: sha256sum mempalace-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip > mempalace-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip.sha256
      - name: Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} mempalace-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip --clobber
          gh release upload ${{ github.ref_name }} mempalace-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip.sha256 --clobber
