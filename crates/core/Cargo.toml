[package]
name = "mempalace-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description.workspace = true

[features]
# Default ships with `embed-fastembed` so the binary works out-of-the-box
# without any extra configuration (ADR-1, 05 §A.4 / §C.2 PR 2). Disable
# default features to opt into a different embedder backend (e.g.
# `embed-tract`, `embed-model2vec`) or `NullEmbedder` for tests.
default = ["embed-fastembed"]
# `fastembed-rs` 4.x. Loads BGE / multilingual-E5 / Nomic / MxBai / etc.
# via the `ort` C++ ONNX Runtime. See `crates/core/src/embed/fastembed.rs`
# for the `FastEmbedEmbedder` adapter and `crates/core/src/embed/mod.rs`
# for `MEMPALACE_EMBED_MODEL` env-var → `EmbeddingModel` enum mapping
# (mp-012, mp-018).
embed-fastembed = ["dep:fastembed"]

[dependencies]
clap = { version = "4", features = ["derive"] }
rusqlite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tokio = { workspace = true }
regex = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
directories = { workspace = true }
walkdir = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
charset = { workspace = true }
reqwest = { workspace = true }
urlencoding = { workspace = true }
rmcp = { version = "1.3", features = ["transport-io"] }
embedvec = "0.5"
edgebert = "0.4"
unicode-script = "0.5"
signal-hook = "0.3"
async-trait = { workspace = true }

# Optional: `fastembed-rs` powers `FastEmbedEmbedder` behind feature
# `embed-fastembed` (mp-012). Pulls in `ort` (C++ ONNX Runtime) and
# `tokenizers`. Disable via `--no-default-features` for builds that
# need a pure-Rust embedder (e.g. `embed-tract` from mp-014) or the
# `NullEmbedder` test backend.
fastembed = { version = "4", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["consoleapi", "wincon"] }

[dev-dependencies]
tempfile = { workspace = true }
mockall = { workspace = true }
tokio-test = { workspace = true }
criterion = { version = "0.5", features = ["async_tokio"] }

# Criterion benches for the production hot paths (mp-002 / Phase 0).
# `cargo bench --no-run` keeps these compiling on every PR; the long-running
# `cargo bench` is intentionally not wired into CI.
[[bench]]
name = "bench_search"
harness = false

[[bench]]
name = "bench_palace_db"
harness = false

[[bench]]
name = "bench_miner"
harness = false
